<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Main hexagon -->
  <path d="M 200 20 L 340 110 L 340 290 L 200 380 L 60 290 L 60 110 Z" 
        fill="#556B2F"/>
  
  <!-- Inner hexagon for depth -->
  <path d="M 200 50 L 310 125 L 310 275 L 200 350 L 90 275 L 90 125 Z" 
        fill="#FFFFFF" 
        opacity="0.1"/>
  
  <!-- Central analytics icon design -->
  <g transform="translate(200, 200)">
    <!-- Rising bar chart -->
    <rect x="-80" y="20" width="28" height="60" fill="#FFFFFF" rx="4"/>
    <rect x="-40" y="-10" width="28" height="90" fill="#FFFFFF" rx="4"/>
    <rect x="0" y="-40" width="28" height="120" fill="#FFFFFF" rx="4"/>
    <rect x="40" y="-60" width="28" height="140" fill="#FFFFFF" rx="4"/>
    
    <!-- Growth arrow overlay -->
    <path d="M -90 50 L 80 -70" 
          stroke="#FFFFFF" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.3"/>
    
    <!-- Arrow head -->
    <path d="M 80 -70 L 60 -65 L 70 -50 Z" 
          fill="#FFFFFF" 
          opacity="0.3"/>
    
    <!-- Accent circles for data points -->
    <circle cx="-66" cy="35" r="6" fill="#556B2F" opacity="0.3"/>
    <circle cx="-26" cy="15" r="6" fill="#556B2F" opacity="0.3"/>
    <circle cx="14" cy="-15" r="6" fill="#556B2F" opacity="0.3"/>
    <circle cx="54" cy="-35" r="6" fill="#556B2F" opacity="0.3"/>
  </g>
  
  <!-- Hexagon border accent -->
  <path d="M 200 20 L 340 110 L 340 290 L 200 380 L 60 290 L 60 110 Z" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="4" 
        opacity="0.2"/>
</svg>